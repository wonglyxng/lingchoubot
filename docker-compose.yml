services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lingchou
      POSTGRES_PASSWORD: lingchou
      POSTGRES_DB: lingchou
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingchou"]
      interval: 5s
      timeout: 3s
      retries: 5

  # S3 兼容对象存储：与 AGENTS.md / 架构文档中的「Docker Compose + MinIO」一致。
  # 后端当前仍以 mock URI 为主，未强制依赖；后续工件实际上传时再接此端点。
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lingchou
      MINIO_ROOT_PASSWORD: lingchou_minio_dev
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - miniodata:/data
    # 官方镜像曾移除 curl，healthcheck 易在不同 tag 下失效；api 不依赖 minio 就绪顺序。

  migrate:
    build:
      context: ./backend
    command: ["migrate", "-direction", "up"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lingchou
      DB_PASSWORD: lingchou
      DB_NAME: lingchou
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lingchou
      DB_PASSWORD: lingchou
      DB_NAME: lingchou
      DB_SSLMODE: disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: lingchou
      MINIO_SECRET_KEY: lingchou_minio_dev
      MINIO_BUCKET: lingchou-artifacts
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080

volumes:
  pgdata:
  miniodata:
