services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lingchou
      POSTGRES_PASSWORD: lingchou
      POSTGRES_DB: lingchou
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lingchou"]
      interval: 5s
      timeout: 3s
      retries: 5

  # S3 兼容对象存储：与 AGENTS.md / 架构文档中的「Docker Compose + MinIO」一致。
  # 后端当前仍以 mock URI 为主，未强制依赖；后续工件实际上传时再接此端点。
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lingchou
      MINIO_ROOT_PASSWORD: lingchou_minio_dev
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - miniodata:/data
    # 官方镜像曾移除 curl，healthcheck 易在不同 tag 下失效；api 不依赖 minio 就绪顺序。

  migrate:
    build:
      context: ./backend
    command: ["migrate", "-direction", "up"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lingchou
      DB_PASSWORD: lingchou
      DB_NAME: lingchou
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./backend
    ports:
      - "${API_HOST_PORT:-8080}:${SERVER_PORT:-8080}"
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: "${SERVER_PORT:-8080}"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lingchou
      DB_PASSWORD: lingchou
      DB_NAME: lingchou
      DB_SSLMODE: disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: lingchou
      MINIO_SECRET_KEY: lingchou_minio_dev
      MINIO_BUCKET: lingchou-artifacts
      MINIO_USE_SSL: "false"
      # LLM 配置（严格模式：必须启用真实 LLM，未配置时工作流链路会拒绝启动）
      LLM_ENABLED: "${LLM_ENABLED:-true}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.openai.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      # Temporal 配置（设为 true 启用 Temporal 编排）
      TEMPORAL_ENABLED: "${TEMPORAL_ENABLED:-false}"
      TEMPORAL_HOST_PORT: "temporal:7233"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_TASK_QUEUE: "lingchou-orchestrator"
      TEMPORAL_WORKER_EMBEDDED: "${TEMPORAL_WORKER_EMBEDDED:-true}"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # 独立 Temporal Worker 进程（生产模式：API 设 TEMPORAL_WORKER_EMBEDDED=false）
  worker:
    build:
      context: ./backend
    command: ["worker"]
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: lingchou
      DB_PASSWORD: lingchou
      DB_NAME: lingchou
      DB_SSLMODE: disable
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: lingchou
      MINIO_SECRET_KEY: lingchou_minio_dev
      MINIO_BUCKET: lingchou-artifacts
      MINIO_USE_SSL: "false"
      LLM_ENABLED: "${LLM_ENABLED:-true}"
      LLM_BASE_URL: "${LLM_BASE_URL:-https://api.openai.com/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      TEMPORAL_ENABLED: "true"
      TEMPORAL_HOST_PORT: "temporal:7233"
      TEMPORAL_NAMESPACE: "default"
      TEMPORAL_TASK_QUEUE: "lingchou-orchestrator"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      temporal:
        condition: service_started
    profiles:
      - temporal

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
    ports:
      - "${FRONTEND_HOST_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"

  # Temporal 工作流引擎（TEMPORAL_ENABLED=true 时 api 服务连接此实例）
  temporal:
    image: temporalio/auto-setup:1.25
    ports:
      - "7233:7233"   # gRPC
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: lingchou
      POSTGRES_PWD: lingchou
      POSTGRES_SEEDS: postgres
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - temporal   # 仅 docker compose --profile temporal up 时启动

  temporal-ui:
    image: temporalio/ui:2.31.2
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    profiles:
      - temporal

volumes:
  pgdata:
  miniodata:
